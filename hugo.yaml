baseURL: https://thewalterman.github.io/
title: thewalterman's blog
theme: ["PaperMod"]

defaultContentLanguage: en
defaultContentLanguageInSubdir: true

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  author: "Walter Lomonaco"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: true
  ShowRssButtonInSectionTermList: false
  hideFooter: true

  profileMode:
    enabled: false
    title: "Walter Lomonaco"
    imageTitle: "Profile"
    imageWidth: 150
    imageHeight: 150
    buttons:
      - name: Blog
        url: /posts/
      - name: About
        url: /about/

  socialIcons:
    - name: github
      url: "https://github.com/thewalterman"
    - name: linkedin
      url: "https://linkedin.com/in/walter-lomonaco"
    - name: email
      url: "mailto:walter.lomonaco@gmail.com"

  cover:
    linkFullImages: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

languages:
  en:
    languageCode: en-us
    languageName: English
    weight: 1
    params:
      homeInfoParams:
        Title: "Hi there"
        Content: "Welcome to thewalterman's blog — notes and write-ups on software and whatever else I'm tinkering with."
    menu:
      main:
        - identifier: about
          name: About
          pageRef: /about
          weight: 10
        - identifier: archives
          name: Archive
          pageRef: /archives
          weight: 20
        - identifier: tags
          name: Tags
          pageRef: /tags
          weight: 30
        - identifier: search
          name: Search
          pageRef: /search
          weight: 40
  it:
    languageCode: it-it
    languageName: Italiano
    weight: 2
    params:
      homeInfoParams:
        Title: "Ciao"
        Content: "Benvenuti nel blog di thewalterman — appunti e articoli su software e altro."
    menu:
      main:
        - identifier: about
          name: Chi sono
          pageRef: /about
          weight: 10
        - identifier: archives
          name: Archivio
          pageRef: /archives
          weight: 20
        - identifier: tags
          name: Tag
          pageRef: /tags
          weight: 30
        - identifier: search
          name: Cerca
          pageRef: /search
          weight: 40
